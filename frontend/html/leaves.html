<main class='container'>
  <h1>Leaves</h1>

  <div class='controls'>
    <button id='leaveSaveBtn'>Save Data</button>
    <button id='leaveLoadBtn'> Load Data</button>
    <button id='leaveClearBtn'>Reset In-Memory</button>
  </div>

  <section class='card form-card'>
    <h2>Add / Edit Leave</h2>
    <form id='leaveForm'>
      <input id='leaveEmp' placeholder='Employee Name' required>
      <input id='leaveFrom' type='date' placeholder='From'>
      <input id='leaveTo' type='date' placeholder='To'>
      <input id='leaveReason' placeholder='Reason'>
      <button type='submit'>Save Row</button>
    </form>
  </section>

  <section class='card'>
    <h2>Leave Records</h2>
    <div id='leaveTableArea'></div>
  </section>
</main>
