<main class='container'>
  <h1>Salaries</h1>

  <div class='controls'>
    <button id='salSaveBtn'> Save Data</button>
    <button id='salLoadBtn'> Load Data</button>
    <button id='salClearBtn'>Reset In-Memory</button>
  </div>

  <section class='card form-card'>
    <h2>Add / Edit Salary</h2>
    <form id='salaryForm'>
      <input id='salEmp' placeholder='Employee Name' required>
      <input id='salAmount' placeholder='Amount' type='number'>
      <input id='salDate' type='date'>
      <button type='submit'>Save Row</button>
    </form>
  </section>

  <section class='card'>
    <h2>Salary Records</h2>
    <div id='salaryTableArea'></div>
  </section>
