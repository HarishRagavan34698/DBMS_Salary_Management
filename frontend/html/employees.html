<main class='container'>
  <h1>Employees</h1>

  <div class='controls'>
    <button id='empSaveBtn'> Save Data</button>
    <button id='empLoadBtn'> Load Data</button>
    <button id='empClearBtn'>Reset In-Memory</button>
  </div>

  <section class='card form-card'>
    <h2>Add / Edit Employee</h2>
    <form id='employeeForm'>
      <input id='empName' placeholder='Name' required>
      <input id='empDesig' placeholder='Designation'>
      <input id='empDept' placeholder='Department'>
      <input id='empSalary' placeholder='Salary' type='number'>
      <button type='submit'>Save Row</button>
    </form>
  </section>

  <section class='card'>
    <h2>Employee Records</h2>
    <div id='employeesTableArea'></div>
  </section>
